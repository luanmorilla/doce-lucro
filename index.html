<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />

  <!-- ✅ Viewport (iPhone notch + Android) + reduz zoom/gestos -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"
  />

  <!-- ✅ Tema / PWA -->
  <meta name="theme-color" content="#070A14" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f6f7fb" />
  <meta name="color-scheme" content="dark light" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="Doce Lucro" />

  <!-- ✅ iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Doce Lucro" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="format-detection" content="telephone=no" />

  <!-- ✅ SEO -->
  <meta name="description" content="Doce Lucro — Lucro real em segundos" />
  <link rel="canonical" href="." />

  <title>Doce Lucro</title>

  <!-- ✅ Manifest -->
  <link rel="manifest" href="./manifest.webmanifest" />

  <!-- ✅ Ícones -->
  <link rel="icon" href="./assets/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png" />
  <!-- Se tiver 180x180, use abaixo -->
  <!-- <link rel="apple-touch-icon" sizes="180x180" href="./assets/icons/apple-touch-icon.png" /> -->

  <!-- ✅ CSS (nova estrutura em subpastas/arquivos) -->
  <link rel="stylesheet" href="./styles/styles.css" />

  <!-- ✅ Preload JS (opcional) -->
  <link rel="modulepreload" href="./src/app.js" />
</head>

<body>
  <noscript>
    <div style="padding:16px;font-family:system-ui,Arial;">
      Este app precisa de JavaScript habilitado para funcionar.
    </div>
  </noscript>

  <div class="app">
    <header class="topbar">
      <div class="topbar__wrap">
        <div class="brand">
          <div class="brand__mark">🍰</div>
          <div class="brand__text">
            <div class="brand__title" id="brandName">Doce Lucro</div>
            <div class="brand__subtitle" id="brandSub">Lucro real em segundos</div>
          </div>
        </div>

        <div class="topbar__actions">
          <button class="iconbtn" id="btnTheme" type="button" aria-label="Tema">
            <span class="icon">🌙</span>
          </button>
        </div>
      </div>
    </header>

    <main class="content">
      <div id="viewRoot"></div>
    </main>

    <nav class="nav" aria-label="Navegação">
      <button class="nav__item" data-route="home" type="button">
        <div class="nav__icon">🏠</div>
        <div class="nav__label">Início</div>
      </button>

      <button class="nav__item" data-route="sale" type="button">
        <div class="nav__icon">💳</div>
        <div class="nav__label">Venda</div>
      </button>

      <button class="nav__item" data-route="orders" type="button">
        <div class="nav__icon">📦</div>
        <div class="nav__label">Encom.</div>
      </button>

      <button class="nav__item" data-route="products" type="button">
        <div class="nav__icon">🎂</div>
        <div class="nav__label">Produtos</div>
      </button>

      <button class="nav__item" data-route="reports" type="button">
        <div class="nav__icon">📈</div>
        <div class="nav__label">Relatórios</div>
      </button>

      <button class="nav__item" data-route="more" type="button">
        <div class="nav__icon">⚙️</div>
        <div class="nav__label">Mais</div>
      </button>
    </nav>

    <div id="modalContainer"></div>
  </div>

  <!-- ✅ JS principal -->
  <script type="module" src="./src/app.js"></script>
</body>
</html>
